run_duration_minutes: 1         # collection time per version; must exceed MIN_SAMPLES_PER_VERSION
flush_wait_seconds: 45          # must exceed POLL_INTERVAL_SECONDS (30 s) so the detector fires at least once after flush

devices:
  - PerfX_Low
  - PerfX_Medium
  - PerfX_High

# Version-code scheme: each experiment gets a unique pair so ClickHouse rows
# from different runs never collide.  Encoding: 1000 * experiment_index + run_id.

experiments:
  # ── E1: per-metric injection detection ──────────────────────────────────────
  - id: e1_cpu_low
    description: "CPU regression, intensity 1 (low)"
    type: cpu
    intensity: 1
    target_screen: cpu_load
    baseline_version_code: 1001
    current_version_code:  1002

  - id: e1_cpu_med
    description: "CPU regression, intensity 2 (medium)"
    type: cpu
    intensity: 2
    target_screen: cpu_load
    baseline_version_code: 1003
    current_version_code:  1004

  - id: e1_cpu_high
    description: "CPU regression, intensity 3 (high)"
    type: cpu
    intensity: 3
    target_screen: cpu_load
    baseline_version_code: 1005
    current_version_code:  1006

  - id: e1_memory_low
    description: "Memory regression, intensity 1 (low)"
    type: memory
    intensity: 1
    target_screen: ram_load
    baseline_version_code: 1011
    current_version_code:  1012

  - id: e1_memory_med
    description: "Memory regression, intensity 2 (medium)"
    type: memory
    intensity: 2
    target_screen: ram_load
    baseline_version_code: 1013
    current_version_code:  1014

  - id: e1_memory_high
    description: "Memory regression, intensity 3 (high)"
    type: memory
    intensity: 3
    target_screen: ram_load
    baseline_version_code: 1015
    current_version_code:  1016

  - id: e1_ui_low
    description: "UI-thread regression, intensity 1 (low)"
    type: ui
    intensity: 1
    target_screen: ui_responsiveness
    baseline_version_code: 1021
    current_version_code:  1022

  - id: e1_ui_med
    description: "UI-thread regression, intensity 2 (medium)"
    type: ui
    intensity: 2
    target_screen: ui_responsiveness
    baseline_version_code: 1023
    current_version_code:  1024

  - id: e1_ui_high
    description: "UI-thread regression, intensity 3 (high)"
    type: ui
    intensity: 3
    target_screen: ui_responsiveness
    baseline_version_code: 1025
    current_version_code:  1026

  # ── E2: false-positive control (identical clean APKs) ────────────────────────
  - id: e2_control_1
    description: "Control run 1 — no regression injected"
    type: none
    intensity: 0
    target_screen: cpu_load
    baseline_version_code: 2001
    current_version_code:  2002

  - id: e2_control_2
    description: "Control run 2 — no regression injected"
    type: none
    intensity: 0
    target_screen: cpu_load
    baseline_version_code: 2003
    current_version_code:  2004

  - id: e2_control_3
    description: "Control run 3 — no regression injected"
    type: none
    intensity: 0
    target_screen: cpu_load
    baseline_version_code: 2005
    current_version_code:  2006

  - id: e2_control_4
    description: "Control run 4 — no regression injected"
    type: none
    intensity: 0
    target_screen: cpu_load
    baseline_version_code: 2007
    current_version_code:  2008

  - id: e2_control_5
    description: "Control run 5 — no regression injected"
    type: none
    intensity: 0
    target_screen: cpu_load
    baseline_version_code: 2009
    current_version_code:  2010

  # ── E7: tier-sensitive regression (detected only on low-tier devices) ────────
  # Fixed CPU work per frame. A fast CPU stays under the frame budget (small shift,
  # not flagged) while a slow CPU overruns it (large shift, flagged). Run on all
  # three cohorts. Calibrate `intensity` (frameWorkIterations) so High stays below
  # the 15% threshold and Low crosses it before collecting the final data.
  - id: e7_frame_tier
    description: "Tier-sensitive frame regression — fixed CPU work per frame"
    type: frame
    intensity: 2
    target_screen: ui_responsiveness
    baseline_version_code: 7001
    current_version_code:  7002

  # ── E10: signal-vs-noise separation on the physical device (frame time) ──────
  # Several no-change runs (noise band) and several regression runs (signal) on
  # the SAME screen, so one plot shows the noise below the 15% threshold and the
  # regression above it. Run on the Redmi. The "ui" regression adds a fixed
  # per-frame block, so frame time rises clearly on any device.
  - id: e10_noise_1
    description: "Separation: no-change run 1"
    type: none
    intensity: 0
    target_screen: ui_responsiveness
    baseline_version_code: 10001
    current_version_code:  10002
  - id: e10_noise_2
    description: "Separation: no-change run 2"
    type: none
    intensity: 0
    target_screen: ui_responsiveness
    baseline_version_code: 10003
    current_version_code:  10004
  - id: e10_noise_3
    description: "Separation: no-change run 3"
    type: none
    intensity: 0
    target_screen: ui_responsiveness
    baseline_version_code: 10005
    current_version_code:  10006
  - id: e10_noise_4
    description: "Separation: no-change run 4"
    type: none
    intensity: 0
    target_screen: ui_responsiveness
    baseline_version_code: 10007
    current_version_code:  10008
  - id: e10_noise_5
    description: "Separation: no-change run 5"
    type: none
    intensity: 0
    target_screen: ui_responsiveness
    baseline_version_code: 10009
    current_version_code:  10010
  - id: e10_noise_6
    description: "Separation: no-change run 6"
    type: none
    intensity: 0
    target_screen: ui_responsiveness
    baseline_version_code: 10011
    current_version_code:  10012
  - id: e10_signal_1
    description: "Separation: regression run 1 (UI per-frame block)"
    type: ui
    intensity: 1
    target_screen: ui_responsiveness
    baseline_version_code: 10101
    current_version_code:  10102
  - id: e10_signal_2
    description: "Separation: regression run 2 (UI per-frame block)"
    type: ui
    intensity: 1
    target_screen: ui_responsiveness
    baseline_version_code: 10103
    current_version_code:  10104
  - id: e10_signal_3
    description: "Separation: regression run 3 (UI per-frame block)"
    type: ui
    intensity: 1
    target_screen: ui_responsiveness
    baseline_version_code: 10105
    current_version_code:  10106
  - id: e10_signal_4
    description: "Separation: regression run 4 (UI per-frame block)"
    type: ui
    intensity: 1
    target_screen: ui_responsiveness
    baseline_version_code: 10107
    current_version_code:  10108

