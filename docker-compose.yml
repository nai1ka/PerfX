version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: perfx-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: perfx
      POSTGRES_USER: perfx_user
      POSTGRES_PASSWORD: perfx_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perfx_user -d perfx"]
      interval: 5s
      timeout: 5s
      retries: 10


  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: metrics
      CLICKHOUSE_USER: metrics_user
      CLICKHOUSE_PASSWORD: metrics_pass
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./Backend/clickhouse/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10


  ktor-app:
    build:
      context: ./Backend/app
      dockerfile: Dockerfile
    container_name: perfx-backend
    ports:
      - "8080:8080"
    environment:
      APP_PORT: 8080

      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: metrics
      CLICKHOUSE_USER: metrics_user
      CLICKHOUSE_PASSWORD: metrics_pass

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: perfx
      POSTGRES_USER: perfx_user
      POSTGRES_PASSWORD: perfx_pass

    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12


  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: perfx-frontend
    ports:
      - "8501:8501"
    environment:
      API_BASE: http://perfx-backend:8080
    depends_on:
      ktor-app:
        condition: service_healthy
    restart: unless-stopped


  detector:
    build:
      context: ./Analysis
      dockerfile: Dockerfile
    container_name: perfx-detector
    environment:
      CH_HOST: clickhouse
      CH_PORT: 8123
      CH_USER: metrics_user
      CH_PASSWORD: metrics_pass
      CH_DATABASE: metrics
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: perfx
      PG_USER: perfx_user
      PG_PASSWORD: perfx_pass
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      HTTPS_PROXY: socks5://host.docker.internal:10818
      NO_PROXY: postgres,clickhouse
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped


  telegram-bot:
    build:
      context: ./Analysis
      dockerfile: Dockerfile
    container_name: perfx-telegram-bot
    command: python telegram_bot.py
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: perfx
      PG_USER: perfx_user
      PG_PASSWORD: perfx_pass
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      HTTPS_PROXY: socks5://host.docker.internal:10818
      NO_PROXY: postgres,clickhouse
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped


volumes:
  postgres_data:
  clickhouse_data:
